apiVersion: apps/v1
kind: Deployment
metadata:
  name: techveo-management-api
  namespace: techveo
  labels:
    app.kubernetes.io/name: techveo-management-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: techveo-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: techveo-management-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: techveo-management-api
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: techveo-system
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: techveo-management-api
          image: grupotechchallenge/techveo-management-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: techveo-shared-config
            - configMapRef:
                name: techveo-management-config
            - secretRef:
                name: techveo-shared-secret
            - secretRef:
                name: techveo-management-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: techveo-management-api-service
  namespace: techveo
  labels:
    app.kubernetes.io/name: techveo-management-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: techveo-system
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: techveo-management-api
  type: ClusterIP
