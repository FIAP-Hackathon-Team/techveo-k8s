apiVersion: apps/v1
kind: Deployment
metadata:
  name: techveo-web
  namespace: techveo
  labels:
    app.kubernetes.io/name: techveo-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: techveo-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: techveo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: techveo-web
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: techveo-system
    spec:
      containers:
        - name: techveo-web
          image: grupotechchallenge/techveo-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: techveo-web-service
  namespace: techveo
  labels:
    app.kubernetes.io/name: techveo-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: techveo-system
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: techveo-web
  type: ClusterIP
