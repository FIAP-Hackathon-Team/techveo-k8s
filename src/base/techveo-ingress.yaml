---
# Ingress para rotas que NÃO precisam de rewrite (frontend e health)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techveo-ingress-frontend
  namespace: techveo
  labels:
    app.kubernetes.io/name: techveo-ingress
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: techveo-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-set-headers: "techveo/custom-headers"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: techveo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: techveo-web-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: techveo-management-api-service
            port:
              number: 8080
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: techveo-web-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: techveo-management-api-service
            port:
              number: 8080
---
# Ingress para rotas que precisam de rewrite (API e Grafana)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: techveo-ingress-api
  namespace: techveo
  labels:
    app.kubernetes.io/name: techveo-ingress
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: techveo-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-set-headers: "techveo/custom-headers"
    nginx.ingress.kubernetes.io/upstream-vhost: "$host"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: techveo.local
    http:
      paths:
      - path: /api/management(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: techveo-management-api-service
            port:
              number: 8080
      - path: /grafana(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
  - http:
      paths:
      - path: /api/management(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: techveo-management-api-service
            port:
              number: 8080
      - path: /grafana(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
